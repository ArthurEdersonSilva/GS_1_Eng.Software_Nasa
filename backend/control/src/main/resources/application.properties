# Configuração do Banco de Dados H2 em Modo File
spring.datasource.url=jdbc:h2:file:./data/missiondb;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Habilita o Console Web do H2 para podermos ver as tabelas
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Atualiza a estrutura do banco automaticamente com base nas classes Java
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true